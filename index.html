<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배터리 및 알람 시계</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 전체 콘텐츠를 화면 중앙에 모아줄 컨테이너 -->
    <div class="app-container">
        
        <!-- [상단 영역] 제목 및 배터리/시계 바 -->
        <header>
            <div class="Title">[주제]사용자와 커뮤니케이션 할 수 있는 웹페이지</div>
            <nav>
                <div class="Title">
                    <div id="batteryLevel">배터리잔량: 100%</div>
                    <div class="Clock" id="clock">00:00:00</div>
                    <div id="date">00:00:00</div>
                </div>
            </nav>
        </header>

        <!-- [메인 영역] 좌측 알람 / 우측 핸드폰 5:5 분리 -->
        <main>
            <!-- 좌측: 알람 설정 및 목록 구역 -->
            <section id="alarmSettingArea">
                <h3>알람 설정 폼</h3>
                <div id="alarmSetting">
                    시: <input type="number" id="alarmSettingHour">
                    분: <input type="number" id="alarmSettingMinutes">
                    초: <input type="number" id="alarmSettingSeconds">
                    <button type="button" id="alarmSettingAddBtn" class="button">추가</button>
                </div>
                <ul id="alarnSettingList">
                    <li class="AlarmItem">
                        <div class="AlarmSettingElement">
                            <div class="Alarm">알람1</div>
                            <div id="alarmSettingElement1">00:00:00</div>
                        </div>
                    </li>
                    <li class="AlarmItem">
                        <div class="AlarmSettingElement">
                            <div class="Alarm">알람2</div>
                            <div id="alarmSettingElement2">00:00:00</div>
                        </div>
                    </li>
                    <li class="AlarmItem">
                        <div class="AlarmSettingElement">
                            <div class="Alarm">알람3</div>
                            <div id="alarmSettingElement3">00:00:00</div>
                        </div>
                    </li>
                    <li class="AlarmItem btn-row">
                        <button type="button" class="AlarmSettingElement button" id="initAlarmListElementBtn">초기화</button>
                    </li>
                </ul>
            </section>

            <!-- 우측: 핸드폰 화면 영역 (검은 네모 안 흰색 네모) -->
            <section id="clockDisplayArea">
                <div class="PhoneScreen">
                    <div id="phoneCamera"></div>
                    <div id="phoneClock" class="Clock">00:00:00</div>
                    <div id="phoneHome"></div>
                </div>
            </section>
        </main>

        <!-- 방전 버튼 -->
        <button type="button" id="battaryZero" class="button">방전</button>

        <!-- [하단 영역] 하트 충전 구역 -->
        <footer>
            <div>
                <button type="button" id="heartBtn">
                    <img type="button" id="heartIMG" src="img/heart.png" alt="❤️">
                </button>
                <h3 id="heartBtnText"></h3>
            </div>
        </footer>

    </div>
    <script src="script.js"></script>
</body>
</html>
